name: Paragliding Generate Brief

on:
  schedule:
    - cron: "30 6 * * *"
      timezone: "America/Los_Angeles"
    - cron: "30 14 * * *"
      timezone: "America/Los_Angeles"
  workflow_dispatch:         # Manual trigger for testing

# Needed to commit brief.json back to the repo
permissions:
  contents: write

jobs:
  send-brief:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2

      - name: Set up Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm ci

      - name: Build agent
        run: npm run build:agent

      - name: Run weather agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SITES: ${{ vars.SITES }}
          PAGES_URL: ${{ vars.PAGES_URL }}
          TOMORROW_IO_API_KEY: ${{ secrets.TOMORROW_IO_API_KEY }}
        run: npm start   # runs dist/run_ci.js — writes docs/briefs/MM-DD.json

      - name: Build frontend
        run: npm run build:frontend

      - name: Commit updated brief
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "chore: brief $(date +'%m-%d') [skip ci]"
          git push